<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rick and Morty Season 8 Countdown</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    #countdown {
      font-size: 2.5rem;
    }
  </style>
</head>
<body>
  <h1>Rick and Morty Season 8 Releases in:</h1>
  <div id="countdown">Loading...</div>

  <audio id="tick1" src="tick1.mp3" preload="auto"></audio>
  <audio id="tick2" src="tick2.mp3" preload="auto"></audio>

  <script>
    const tick1 = document.getElementById("tick1");
    const tick2 = document.getElementById("tick2");
    let useFirstTick = true;

    function playTick() {
      const sound = useFirstTick ? tick1 : tick2;
      sound.currentTime = 0;
      sound.play().catch(() => {});
      useFirstTick = !useFirstTick;
    }

    function updateCountdown() {
      const now = new Date();
      const target = new Date(now.getFullYear(), 4, 25);

      if (now >= target) {
        document.getElementById("countdown").textContent = "RELEASED!";
        clearInterval(timer);
        return;
      }

      const diff = target - now;

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById("countdown").textContent = 
        `${days}d ${hours}h ${minutes}m ${seconds}s`;

      playTick();
    }

    updateCountdown();
    const timer = setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
