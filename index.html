<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Wiki</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #333;
            color: white;
            padding: 10px 20px;
            text-align: center;
        }
        nav {
            display: flex;
            justify-content: center;
            background-color: #444;
        }
        nav a {
            color: white;
            padding: 14px 20px;
            text-decoration: none;
            text-align: center;
            flex: 1;
        }
        nav a:hover {
            background-color: #ddd;
            color: black;
        }
        .tab-content {
            display: none;
            padding: 20px;
            background-color: white;
            margin: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .active-tab {
            display: block;
        }
        .item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .item img {
            width: 50px;
            height: 50px;
            margin-right: 10px;
        }
        .item h3 {
            margin: 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>Game Wiki</h1>
    </header>
    <nav>
        <a href="#" onclick="showTab('items')">Items</a>
        <a href="#" onclick="showTab('features')">Features</a>
        <a href="#" onclick="showTab('techs')">Techs</a>
    </nav>
    <div id="items" class="tab-content">
        <h2>Items</h2>
        <div id="items-list"></div>
    </div>
    <div id="features" class="tab-content">

        <p>Content for Features tab goes here.</p>

        function showTab(tabName) {
            const tabs = document.querySelectorAll('.tab-content');
            tabs.forEach(tab => tab.classList.remove('active-tab'));
            document.getElementById(tabName).classList.add('active-tab');
        }

        async function fetchImageUrl(assetId) {
            const url = `https://thumbnails.roblox.com/v1/assets?assetIds=${assetId}&size=150x150&format=Png&isCircular=false`;
            const response = await fetch(url);
            const data = await response.json();
            return data.data[0]?.imageUrl || '';
        }

        async function loadItems() {
            const itemsList = document.getElementById('items-list');
            WeaponConfig.Primary.forEach(async (item) => {
                const imageUrl = await fetchImageUrl(item.Image.split('://')[1]);
                const itemElement = document.createElement('div');
                itemElement.classList.add('item');
                itemElement.innerHTML = `
                    <img src="${imageUrl}" alt="${item.DisplayName}">
                    <div>
                        <h3>${item.DisplayName}</h3>
                        <p>${item.Description}</p>
                        <p><strong>Wins Required:</strong> ${item.WinsRequired}</p>
                    </div>
                `;
                itemsList.appendChild(itemElement);
            });
        }

        window.onload = () => {
            showTab('items');
            loadItems();
        };
    </script>
