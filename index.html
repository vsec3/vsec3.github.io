<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoltSec</title>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #000000;
      color: #00ff00;
      font-family: "Press Start 2P", cursive;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      flex-direction: column;
      overflow: hidden;
    }
    #particles-js {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: -1;
    }
    h1 {
      font-size: 3rem;
      font-weight: bold;
      text-shadow: 0 0 5px #00ff00, 0 0 10px #00ff00;
    }
    p {
      font-size: 1.5rem;
      margin-top: 10px;
      opacity: 0.8;
      text-shadow: 0 0 5px #00ff00, 0 0 10px #00ff00;
    }
    .blurred-content {
      position: relative;
      z-index: 1;
      transition: filter 0.3s ease;
      display: none; /* Initially hidden */
      text-align: center;
    }
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
      opacity: 1;
      transition: opacity 0.5s ease;
    }
    .hidden {
      opacity: 0;
      pointer-events: none;
    }
    .project-card {
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid #00ff00;
      border-radius: 10px;
      padding: 30px;
      margin-top: 30px; /* Spacing from the main text */
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 0 10px #00ff00;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .project-card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #00ff00, 0 0 30px #00ff00;
    }
    .project-card h2 {
      font-size: 2rem;
      margin-bottom: 20px;
      text-shadow: 0 0 5px #00ff00;
    }
    .project-card p {
      font-size: 1.2rem;
      opacity: 0.8;
      text-shadow: 0 0 5px #00ff00;
      margin-bottom: 20px;
    }
    .project-card img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 20px;
      border: 2px solid #00ff00;
    }
    .project-card .download-button {
      background: #00ff00;
      color: #000000;
      border: none;
      padding: 10px 20px;
      font-family: "Press Start 2P", cursive;
      font-size: 1rem;
      cursor: pointer;
      text-shadow: 0 0 5px #00ff00;
      box-shadow: 0 0 10px #00ff00;
      transition: background 0.3s ease, transform 0.3s ease;
    }
    .project-card .download-button:hover {
      background: #00cc00;
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <div id="particles-js"></div>

  <div class="overlay" id="overlay">
    <h1>Press click to enter...</h1>
  </div>

  <div class="blurred-content" id="content" style="filter: blur(5px);">
    <h1>Welcome to VoltSec.xyz!</h1>
    <p id="typewriter"></p>
    <audio id="audio" src="https://raw.githubusercontent.com/vsec3/vsec3.github.io/main/familyties.mp3"></audio>

    <!-- Project Card -->
    <div class="project-card">
      <h2>Project Title</h2>
      <img src="https://via.placeholder.com/450x250" alt="Project Image">
      <p>This is a brief description of the project. It showcases some of the cool stuff we're working on.</p>
      <button class="download-button">Download</button>
    </div>
  </div>

  <script>
    document.getElementById("overlay").addEventListener("click", function() {
      const audio = document.getElementById("audio");
      audio.play().catch(error => console.error("Playback error:", error));
      this.classList.add("hidden");
      document.getElementById("content").style.display = "block";
      document.getElementById("content").style.filter = "blur(0)";
      typewriterEffect();
    });

    particlesJS("particles-js", {
      particles: {
        number: { value: 100 },
        shape: { type: "circle" },
        opacity: { value: 0.7, random: true },
        size: { value: 3, random: true },
        move: { speed: 1, direction: "bottom", out_mode: "out" },
        line_linked: { enable: false }
      }
    });

    const phrases = [
      "I spent 20 bucks for this domain.",
      "If you are seeing this, good job!",
      "voltsec on top fr chat",
      "Skibidi alpha sigma rizz 420",
      "JFK's assassination was planned by the CIA",
      "I love the CCP and the Kremlin",
      "All Hail ChatGPT",
      "voltsec b4 gta6?",
      "This typewriter effect took me too long"
    ];

    let phraseIndex = 0;
    let letterIndex = 0;
    let deleting = false;
    const typeSpeed = 100;
    const pauseTime = 2000;
    const eraseSpeed = 50;

    function typewriterEffect() {
      const typewriter = document.getElementById("typewriter");

      if (!deleting) {
        typewriter.textContent = phrases[phraseIndex].substring(0, letterIndex);
        letterIndex++;

        if (letterIndex > phrases[phraseIndex].length) {
          setTimeout(() => deleting = true, pauseTime);
        }
      } else {
        typewriter.textContent = phrases[phraseIndex].substring(0, letterIndex);
        letterIndex--;

        if (letterIndex === 0) {
          deleting = false;
          phraseIndex = (phraseIndex + 1) % phrases.length;
        }
      }

      setTimeout(typewriterEffect, deleting ? eraseSpeed : typeSpeed);
    }
  </script>
</body>
</html>
