<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Game Wiki</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #555555;
    color: #eee;
  }
  header {
    background-color: #333;
    padding: 1rem 2rem;
    font-size: 1.8rem;
    font-weight: bold;
    user-select: none;
  }
  nav {
    display: flex;
    background-color: #444;
    user-select: none;
  }
  nav button {
    flex: 1;
    background: none;
    border: none;
    color: #eee;
    padding: 1rem 0;
    cursor: pointer;
    font-size: 1.1rem;
    transition: background-color 0.3s ease;
  }
  nav button:hover {
    background-color: #666;
  }
  nav button.active {
    background-color: #222;
    font-weight: bold;
    color: #fff;
  }
  main {
    padding: 1.5rem 2rem;
    min-height: 80vh;
  }
  /* Items grid */
  .items-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill,minmax(260px,1fr));
    gap: 1rem;
  }
  .item-card {
    background: #444;
    border-radius: 8px;
    padding: 1rem;
    box-shadow: 0 0 8px #222 inset;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .item-image {
    width: 128px;
    height: 128px;
    background-color: #222;
    background-position: center;
    background-size: contain;
    background-repeat: no-repeat;
    margin-bottom: 0.75rem;
    border-radius: 6px;
    box-shadow: 0 0 5px #111 inset;
  }
  .item-name {
    font-size: 1.25rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
    text-align: center;
  }
  .item-toolname {
    font-size: 0.9rem;
    font-style: italic;
    color: #bbb;
    margin-bottom: 0.5rem;
  }
  .item-desc {
    font-size: 1rem;
    text-align: center;
    margin-bottom: 0.5rem;
  }
  .item-wins {
    font-size: 0.9rem;
    color: #ccc;
  }
  /* Features & Tech template */
  .template-placeholder {
    font-style: italic;
    opacity: 0.6;
    text-align: center;
    margin-top: 3rem;
    font-size: 1.2rem;
    user-select: none;
  }
</style>
</head>
<body>

<header>Game Wiki</header>
<nav>
  <button id="tab-items" class="active" onclick="switchTab('items')">Items</button>
  <button id="tab-features" onclick="switchTab('features')">Features</button>
  <button id="tab-techs" onclick="switchTab('techs')">Techs</button>
</nav>
<main id="content">

<!-- Items content will be inserted here dynamically -->

  // Helper to get image url from Roblox assetid string
  // Roblox images can be fetched from https://www.roblox.com/asset/?id=ASSETID (using numeric id)
  // We'll parse out the numeric part from the rbxassetid string
  function getRobloxImageUrl(rbxAssetId) {
    const match = rbxAssetId.match(/rbxassetid:\/\/(\d+)/);
    if (!match) return "";
    return `https://www.roblox.com/asset/?id=${match[1]}`;
  }

  // Function to generate items tab content
  function generateItemsContent() {
    const container = document.createElement("div");
    container.className = "items-grid";

    // Iterate Primary and Secondary items
    ["Primary", "Secondary"].forEach(category => {
      const categoryItems = WeaponConfig[category];
      if (!categoryItems) return;

      // Category header
      const header = document.createElement("h2");
      header.textContent = category + " Weapons";
      header.style.gridColumn = "1 / -1";
      header.style.marginTop = "2rem";
      container.appendChild(header);

      categoryItems.forEach(item => {
        const card = document.createElement("div");
        card.className = "item-card";

        const img = document.createElement("div");
        img.className = "item-image";
        img.style.backgroundImage = `url('${getRobloxImageUrl(item.Image)}')`;
        card.appendChild(img);

        const name = document.createElement("div");
        name.className = "item-name";
        name.textContent = item.DisplayName;
        card.appendChild(name);

        const toolName = document.createElement("div");
        toolName.className = "item-toolname";
        toolName.textContent = `Tool Name: ${item.ToolName}`;
        card.appendChild(toolName);

        const desc = document.createElement("div");
        desc.className = "item-desc";
        desc.textContent = item.Description;
        card.appendChild(desc);

        const wins = document.createElement("div");
        wins.className = "item-wins";
        wins.textContent = `Wins Required: ${item.WinsRequired}`;
        card.appendChild(wins);

        container.appendChild(card);
      });
    });

    return container;
  }

  // Templates for features and techs tabs
  function generateTemplateContent(title) {
    const div = document.createElement("div");
    div.className = "template-placeholder";
    div.textContent = `This is the placeholder for the ${title} tab. Please fill it out.`;
    return div;
  }

  function switchTab(tab) {
    // Update nav buttons active state
    document.querySelectorAll("nav button").forEach(btn => {
      btn.classList.toggle("active", btn.id === "tab-" + tab);
    });

    const content = document.getElementById("content");
    content.innerHTML = "";

    if (tab === "items") {
      content.appendChild(generateItemsContent());
    } else if (tab === "features") {
      content.appendChild(generateTemplateContent("features"));
    } else if (tab === "techs") {
      content.appendChild(generateTemplateContent("techs"));
    }
  }

  // Initialize page with items tab
  switchTab("items");
</script>

</body>
</html>
